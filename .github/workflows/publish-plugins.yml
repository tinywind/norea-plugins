name: Publish Plugins

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.production.json'
      - '.github/workflows/publish-plugins.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Plugin Artifacts
    if: ${{ github.ref_name != 'private' && !startsWith(github.ref_name, 'private/') }}
    runs-on: ubuntu-latest
    outputs:
      plugin_files: ${{ steps.plugin_files.outputs.files }}
      dist_branch: ${{ steps.version.outputs.dist_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Resolve plugin version
        id: version
        run: |
          version="$(node -e "console.log(require('./package.json').version)")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dist_branch=plugins/v$version" >> "$GITHUB_OUTPUT"

      - name: Generate plugin index
        run: node scripts/generate-plugin-index.js

      - name: Compile plugin JavaScript
        run: npx tsc --project tsconfig.production.json

      - name: Build plugin manifest
        run: npm run build:manifest
        env:
          BRANCH: ${{ steps.version.outputs.dist_branch }}

      - name: Verify generated plugin artifacts
        run: |
          test -s .dist/plugins.min.json
          test -s .dist/plugins.json
          test -d .js/plugins

      - name: Collect compiled plugin files
        id: plugin_files
        run: |
          node --input-type=module <<'NODE'
          import fs from 'fs';
          import path from 'path';

          const root = '.js/plugins';
          const files = [];

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(fullPath);
              } else if (entry.isFile() && entry.name.endsWith('.js')) {
                const relative = path.relative(root, fullPath).split(path.sep).join('/');
                const artifact = `plugin-js-${relative.replace(/\.js$/, '').replace(/[^a-zA-Z0-9_.-]+/g, '-')}`;
                files.push({ relative, artifact });
              }
            }
          }

          walk(root);
          files.sort((a, b) => a.relative.localeCompare(b.relative));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `files=${JSON.stringify(files)}\n`);
          NODE

      - name: Upload plugin manifest artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugins-manifest
          path: |
            .dist/plugins.json
            .dist/plugins.min.json
            total.svg
          if-no-files-found: error
          retention-days: 30

      - name: Upload compiled plugin JavaScript bundle
        uses: actions/upload-artifact@v7
        with:
          name: compiled-plugin-js
          path: .js/plugins/**/*.js
          if-no-files-found: error
          retention-days: 30

  upload-plugin-js:
    name: Upload ${{ matrix.plugin.artifact }}
    needs: build
    if: ${{ github.ref_name != 'private' && !startsWith(github.ref_name, 'private/') && needs.build.outputs.plugin_files != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.build.outputs.plugin_files) }}
    steps:
      - name: Download compiled plugin bundle
        uses: actions/download-artifact@v5
        with:
          name: compiled-plugin-js
          path: compiled-plugin-js

      - name: Upload compiled plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.plugin.artifact }}
          path: compiled-plugin-js/${{ matrix.plugin.relative }}
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish Plugins
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && github.ref_name != 'private' && !startsWith(github.ref_name, 'private/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # plugins.min.json points at raw files on the published plugins/vX branch.
      # GitHub Actions artifacts are zipped, expiring downloads and are not stable plugin runtime URLs.
      - name: Publish plugins
        run: npm run publish:plugins
